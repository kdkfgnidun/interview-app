<style>
  body {
    margin: 0;
    font-family: sans-serif;
  }

  h1 {
    text-align: center;
    margin-top: 40px;
  }

  .grid-container {
    display: grid;
    grid-template-columns: repeat(5, 100px); 
    grid-template-rows: repeat(2, 100px);    
    gap: 15px;                               
    justify-content: center;                 
    margin-top: 30px;
  }

  .box {
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #FFCE1B;
    color: white;
    font-size: 24px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer; 
    transition: background 0.3s, transform 0.1s;
    user-select: none;
  }

  .box:hover {
    background-color: #E1AD01;
  }

  .box:active {
    background-color: #B38600;
    transform: scale(0.92); 
  }

  /* INTERVIEW SCREEN */
  #interviewScreen {
    display: none;
    background: white;
    color: black;
    min-height: 100vh;
    padding: 40px;
  }

  /* CHAT FLOW */
  .chat {
    max-width: 800px;
    margin: 0 auto;
  }

  .row {
    display: flex;
    margin-top: 30px;
  }

  .question {
    justify-content: flex-start;
  }

  .answer {
    justify-content: flex-end;
  }

  .bubble {
    max-width: 60%;
    font-size: 20px;
    line-height: 1.5;
  }

  .message {
    opacity: 0;
    transition: opacity 1s ease;
  }

  .show {
    opacity: 1;
  }
</style>

let currentDialogue = [];
let index = 0;
let showingAnswer = false;
let firstClickDone = false;
let firstAnswerShown = false; // NEW

function startInterview(e, boxNumber) {
  e.stopPropagation(); // prevent double trigger

  currentDialogue = dialogues[boxNumber];
  index = 0;
  showingAnswer = false;
  firstClickDone = false;
  firstAnswerShown = false; // reset

  document.getElementById("grid").style.display = "none";
  document.getElementById("title").style.display = "none";
  document.getElementById("interviewScreen").style.display = "block";

  document.getElementById("chat").innerHTML = "";

  // Show ONLY first question (no scroll)
  const chat = document.getElementById("chat");
  const row = document.createElement("div");
  row.className = "row question message";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerText = currentDialogue[index].q;

  row.appendChild(bubble);
  chat.appendChild(row);

  setTimeout(() => row.classList.add("show"), 50);

  showingAnswer = true;
  firstClickDone = true;
}

function showNext() {
  if (!firstClickDone) return;

  const chat = document.getElementById("chat");

  if (index >= currentDialogue.length) {
    document.getElementById("interviewScreen").style.display = "none";
    document.getElementById("grid").style.display = "grid";
    document.getElementById("title").style.display = "block";
    return;
  }

  if (showingAnswer) {
    // SHOW ANSWER
    const row = document.createElement("div");
    row.className = "row answer message";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerText = currentDialogue[index].a;

    row.appendChild(bubble);
    chat.appendChild(row);

    setTimeout(() => row.classList.add("show"), 50);

    // ONLY scroll on FIRST answer
    if (!firstAnswerShown) {
      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
      firstAnswerShown = true;
    } else {
      // normal scroll after
      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }

    showingAnswer = false;
    index++;
  } else {
    // SHOW NEXT QUESTION
    if (index < currentDialogue.length) {
      const row = document.createElement("div");
      row.className = "row question message";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerText = currentDialogue[index].q;

      row.appendChild(bubble);
      chat.appendChild(row);

      setTimeout(() => row.classList.add("show"), 50);

      showingAnswer = true;

      // scroll normally for questions AFTER first answer
      if (firstAnswerShown) {
        window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
      }
    }
  }
}

document.body.addEventListener("click", function() {
  if (document.getElementById("interviewScreen").style.display === "block") {
    showNext();
  }
});
